apiVersion: v1
kind: Pod
metadata:
 name: random-number-generator-pvc
spec:
  nodeName: kcna-worker
  containers:
  - image: alpine
    name: alpine
    command: ["/bin/sh","-c"]
    args: ["shuf -i 0-100 -n 1 >> /opt/number.out;"]
    volumeMounts:
      - mountPath: /data
        name: my-storage
  volumes:
  - name: my-storage
    persistentVolumeClaim:
      claimName: myclaim    

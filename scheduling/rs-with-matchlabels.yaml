apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: myapp-replicaset
  labels:
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      name: nginx-3
      labels:
        app: myapp
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
          - containerPort: 80